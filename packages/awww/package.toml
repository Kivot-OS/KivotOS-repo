name = "awww"
repo = "codeberg:LGFae/awww"
version = "v0.12.1"
type = "custom"
# Build workspace (binaries: awww + awww-daemon).
# build.rs auto-generates shell completions to <repo>/completions/.
# Man pages are .scd source — compile with scdoc into doc/generated/.
build = "cargo build --release --workspace"
post_build = "mkdir -p doc/generated && cd doc && for f in *.scd; do scdoc < \"$f\" | gzip -n > \"generated/${f%.scd}.gz\"; done"
binary = "awww"
description = "An Answer to your Wayland Wallpaper Woes (workspace: awww + awww-daemon)"
license = "GPL-3.0"
homepage = "https://codeberg.org/LGFae/awww"

[depends]
build = [
    "rustc",
    "cargo",
    "git",
    "pkg-config",
    "libwayland-dev",
    "wayland-protocols",
    "liblz4-dev",
    "scdoc",
]
runtime = [
    "libwayland-client0",
    "liblz4-1",
]
optional = []

[distro]
codenames = ["trixie"]
arch = "amd64"

[control]
maintainer = "Dinh Manh Dung <dungdinhmanh0209@gmail.com>"
section = "graphics"
priority = "optional"
homepage = "https://codeberg.org/LGFae/awww"

[install]
"target/release/awww"               = "/usr/bin/awww"
"target/release/awww-daemon"        = "/usr/bin/awww-daemon"
"completions/awww.bash"             = "/usr/share/bash-completion/completions/awww"
"completions/_awww"                 = "/usr/share/zsh/site-functions/_awww"
"completions/awww.fish"             = "/usr/share/fish/vendor_completions.d/awww.fish"
"doc/generated/awww.1.gz"           = "/usr/share/man/man1/awww.1.gz"
"doc/generated/awww-daemon.1.gz"    = "/usr/share/man/man1/awww-daemon.1.gz"
"doc/generated/awww-img.1.gz"       = "/usr/share/man/man1/awww-img.1.gz"
"doc/generated/awww-query.1.gz"     = "/usr/share/man/man1/awww-query.1.gz"
"doc/generated/awww-restore.1.gz"   = "/usr/share/man/man1/awww-restore.1.gz"
"doc/generated/awww-clear.1.gz"     = "/usr/share/man/man1/awww-clear.1.gz"
"doc/generated/awww-clear-cache.1.gz" = "/usr/share/man/man1/awww-clear-cache.1.gz"
"doc/generated/awww-kill.1.gz"      = "/usr/share/man/man1/awww-kill.1.gz"
"doc/generated/awww-pause.1.gz"     = "/usr/share/man/man1/awww-pause.1.gz"
"contrib/systemd/awww-daemon.service" = "/usr/lib/systemd/user/awww-daemon.service"
