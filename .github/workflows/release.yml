name: Release
on:
  push:
    tags: 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/github-script@v9.0.0
        id: notes
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_URL: ${{ vars.AI_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        with:
          script: |
            const { execSync } = require('child_process');
            const changelog = require('./scripts/gen-changelog.js');
            const apiKey = process.env.AI_API_KEY;
            const apiUrl = process.env.AI_URL || 'https://ollama.com/api/chat';
            const model = process.env.AI_MODEL || 'devstral-small-2:24b-cloud';

            const prev = execSync('git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true').toString().trim();
            const log = execSync(`git log ${prev || 'HEAD~10'}..HEAD --oneline --no-decorate`).toString().trim();

            const baseNotes = changelog.generateMarkdown(prev || 'beginning', context.ref.replace('refs/tags/', ''), log);

            if (!apiKey) {
              core.notice('No AI_API_KEY, using basic changelog');
              return baseNotes;
            }

            try {
              const resp = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + apiKey,
                },
                body: JSON.stringify({
                  model: model,
                  messages: [
                    { role: 'system', content: 'Generate concise release notes from git log. Group by: Features, Bug Fixes, CI/Infrastructure. Output as markdown.' },
                    { role: 'user', content: 'Git log:\n' + log },
                  ],
                  stream: false,
                  temperature: 0.1,
                  max_tokens: 1000,
                }),
              });
              if (resp.ok) {
                const data = await resp.json();
                const aiNotes = data.message?.content || data.choices?.[0]?.message?.content;
                if (aiNotes) return aiNotes;
              }
            } catch (e) {
              core.warning('AI generation failed, using basic changelog: ' + e.message);
            }
            return baseNotes;

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          body: ${{ steps.notes.outputs.result }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
