name: Build Packages

on:
  push:
    branches: ["main"]
    paths:
      - "packages/**"
      - "packages.lock"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  NFPM_VERSION: "2.41.0"

jobs:

  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install deps
        run: pip install toml requests pyyaml

      - name: Generate matrix
        id: set-matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MATRIX=$(python scripts/manager.py matrix)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    runs-on: ubuntu-24.04
    container: debian:trixie
    timeout-minutes: 30
    if: needs.matrix.outputs.matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Install package build dependencies
        if: matrix.depends && matrix.depends.build
        run: |
          apt-get update && apt-get upgrade -y
          DEPS=$(echo '${{ toJson(matrix.depends.build) }}' | jq -r '.[]' | tr '\n' ' ')
          if [ -n "$DEPS" ]; then
            apt-get install -y $DEPS
          fi

      - name: Setup Rust toolchain
        if: matrix.type == 'cargo' || matrix.type == 'make'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold linker
        if: matrix.type == 'cargo'
        uses: rui314/setup-mold@v1

      - name: Cache Rust dependencies
        if: matrix.type == 'cargo' || matrix.type == 'make'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "rust-${{ matrix.name }}"
          workspaces: "src -> target"
          cache-on-failure: true


      - name: Cache mangowc dependencies
        if: matrix.name == 'mangowc'
        uses: actions/cache@v4
        with:
          path: |
            build/local
            build/deps
          key: mangowc-deps-${{ hashFiles('packages/mangowc/build.sh') }}-v1

      - name: Install cargo-deb
        if: matrix.type == 'cargo'
        run: cargo install cargo-deb

      - name: Install nfpm
        if: matrix.type != 'cargo'
        run: |
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb" \
            -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - uses: actions/setup-python@v5
        if: matrix.type != 'cargo'
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Python deps
        if: matrix.type != 'cargo'
        run: pip install toml pyyaml

      - name: Build ${{ matrix.name }}
        env:
          APP_VERSION: ${{ matrix.version }}
          POST_BUILD:  ${{ matrix.post_build }}
        run: |
          mkdir -p dist

          REPO_URL="${{ matrix.repo }}"
          case "$REPO_URL" in
            github:*)   REPO_URL="https://github.com/${REPO_URL#github:}"   ;;
            codeberg:*) REPO_URL="https://codeberg.org/${REPO_URL#codeberg:}" ;;
          esac

          clone_repo() {
            local url="$1" ver="$2"
            rm -rf src
            if [[ "$ver" == "latest" ]]; then
              git clone --depth=1 "$url" src
            else
              git clone --depth=1 --branch "$ver" "$url" src 2>/dev/null || {
                git clone --depth=1 "$url" src
                cd src
                git fetch --depth=1 origin "$ver"
                git checkout "$ver"
                cd ..
              }
            fi
          }

          case "${{ matrix.type }}" in

            cargo)
              clone_repo "$REPO_URL" "${{ matrix.version }}"
              cd src
              cargo deb ${{ matrix.deb_package && format('-p %s', matrix.deb_package) || '' }}
              cd ..
              ;;

            make)
              clone_repo "$REPO_URL" "${{ matrix.version }}"
              cd src
              source "$HOME/.cargo/env" 2>/dev/null || true
              export PATH="$HOME/.cargo/bin:$PATH"
              ${{ matrix.build_cmd }}
              cd ..
              ;;

            custom)
              clone_repo "$REPO_URL" "${{ matrix.version }}"
              cd src
              ${{ matrix.build_cmd }}
              [[ -n "$POST_BUILD" ]] && eval "$POST_BUILD"
              cd ..
              ;;

            ninja)
              clone_repo "$REPO_URL" "${{ matrix.version }}"
              cd src
              meson setup build --prefix=/usr --buildtype=release
              ninja -C build
              cd ..
              ;;

          esac

      - name: sccache stats
        if: matrix.type == 'cargo' || matrix.type == 'make'
        run: sccache --show-stats || true

      - name: Collect cargo-deb output
        if: matrix.type == 'cargo'
        run: |
          mkdir -p dist
          if ls src/target/debian/*.deb 2>/dev/null; then
            cp src/target/debian/*.deb dist/
          else
            echo "❌ cargo-deb output not found"
            exit 1
          fi

      - name: Generate nfpm config & package
        if: matrix.type != 'cargo'
        run: |
          python scripts/manager.py nfpm-config \
            --package "${{ matrix.name }}" \
            --src-dir src \
            --output /tmp/nfpm.yaml

          echo "--- nfpm.yaml ---"
          cat /tmp/nfpm.yaml

          mkdir -p dist
          nfpm package \
            --config /tmp/nfpm.yaml \
            --packager deb \
            --target dist/

          echo "✅ $(ls -lh dist/*.deb)"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.name }}
          path: dist/*.deb
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-24.04
    container: debian:trixie
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: all-debs
          merge-multiple: true

      - name: Setup aptly
        run: sudo apt-get install -y aptly

      - name: Configure GPG
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'pinentry-mode loopback\nbatch\n' > ~/.gnupg/gpg.conf
          printf 'allow-loopback-pinentry\n'       > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import

      - name: Publish to Cloudflare R2
        env:
          GPG_PASSPHRASE:       ${{ secrets.GPG_PASSPHRASE }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG \
                   | grep sec | awk '{print $2}' | cut -d/ -f2 | head -n1)

          cat > ~/.aptly.conf <<JSON
          {
            "rootDir": "$HOME/.aptly",
            "downloadConcurrency": 4,
            "S3PublishEndpoints": {
              "r2": {
                "region":             "auto",
                "bucket":             "${R2_BUCKET}",
                "endpoint":           "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com",
                "awsAccessKeyID":     "${R2_ACCESS_KEY_ID}",
                "awsSecretAccessKey": "${R2_SECRET_ACCESS_KEY}",
                "acl":                "none",
                "plusWorkaround":     true,
                "forceSigV2":         false
              }
            }
          }
          JSON

          aptly repo create -distribution=trixie -component=main kivotos

          find all-debs -name "*.deb" -exec aptly repo add kivotos {} +

          echo "📦 Packages to publish:"
          aptly repo show -with-packages kivotos

          if aptly publish show trixie s3:r2: &>/dev/null; then
            echo "🔄 Updating existing publication..."
            aptly publish update \
              -gpg-key="$KEY_ID" \
              -passphrase="$GPG_PASSPHRASE" \
              trixie s3:r2:
          else
            echo "🚀 Publishing for the first time..."
            aptly publish repo \
              -distribution=trixie \
              -architectures=amd64 \
              -gpg-key="$KEY_ID" \
              -passphrase="$GPG_PASSPHRASE" \
              kivotos s3:r2:
          fi

          pip install awscli -q
          aws configure set aws_access_key_id     "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"

          gpg --export --armor "$KEY_ID" > pubkey.gpg
          aws s3 cp pubkey.gpg "s3://${R2_BUCKET}/pubkey.gpg" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type "application/pgp-keys"

          echo "✅ Published to R2 successfully!"
